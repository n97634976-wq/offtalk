name: offtalk
description: "OffTalk – offline-first, serverless, encrypted messaging app using Bluetooth mesh and P2P. Works without internet. Open source."
homepage: https://github.com/n97634976-wq/offtalk
repository: https://github.com/n97634976-wq/offtalk
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Local Storage & Encryption
  sqflite_sqlcipher: ^3.1.0+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Mesh & Network
  flutter_blue_plus: ^1.15.5
  wifi_iot: ^0.3.18
  dart_libp2p: ^0.5.2
  dart_libp2p_kad_dht: ^1.1.0
  pointycastle: ^3.7.0
  flutter_webrtc: ^1.4.1
  dio: ^5.4.0
  
  # Media & Files
  image_picker: ^1.0.7
  flutter_sound: ^9.2.13
  image: ^4.1.4            # Image compression
  file_picker: ^8.1.4
  
  # QR, Sharing, & Permissions
  permission_handler: ^11.2.0
  mobile_scanner: ^3.5.5
  qr_flutter: ^4.1.0
  share_plus: ^7.2.1
  nfc_manager: ^4.1.1
  
  # UI & Map
  flutter_map: ^8.2.2
  latlong2: ^0.9.0
  flutter_map_tile_caching: ^10.1.0
  geolocator: ^11.0.0
  intl: ^0.18.1
  
  # Background Services
  workmanager: ^0.9.0
  background_fetch: ^1.1.3
  flutter_foreground_task: ^6.1.2
  
  # Utils
  uuid: ^4.3.3
  logger: ^2.0.2
  collection: ^1.18.0
  path: ^1.8.3
  crypto: ^3.0.3
  emoji_picker_flutter: ^4.4.0
  local_auth: ^2.3.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/icon.png"
  min_sdk_android: 21
